<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Inventory System</title>
    <link rel="stylesheet" href="../../css/global.css">
    <style>
        .billing-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .bill-card { background: var(--bg-card); padding: 1.5rem; border-radius: 0.5rem; border: 1px solid var(--border-color); }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); }
        .product-item input[type="number"] { width: 80px; padding: 0.25rem; background: var(--bg-dark); color: white; border: 1px solid var(--border-color); border-radius: 0.25rem; }
    </style>
</head>
<body>
    <div class="main-content">
        <h1 style="margin-bottom: 2rem;">New Bill</h1>
        <div class="billing-grid">
            <div class="bill-card">
                <h2>Select Products</h2>
                <div class="form-group mt-4">
                    <input type="text" id="productSearch" placeholder="Search products..." onkeyup="filterProducts()">
                </div>
                <div id="productList" style="max-height: 400px; overflow-y: auto;">
                    <!-- Products list -->
                </div>
            </div>

            <div class="bill-card">
                <h2>Bill Summary</h2>
                <div class="form-group mt-4">
                    <label>Select Customer (Optional)</label>
                    <select id="customerSelect">
                        <option value="">Walk-in Customer</option>
                    </select>
                </div>

                <div id="selectedItems" style="margin: 1.5rem 0; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 1rem 0; min-height: 100px;">
                    <!-- Selected items appear here -->
                    <p class="text-center" style="color: var(--text-muted);" id="emptyCart">Cart is empty</p>
                </div>

                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <strong>Total Amount:</strong>
                    <strong id="totalAmountText">₹0.00</strong>
                </div>

                <div class="form-group">
                    <label>Paid Amount (₹)</label>
                    <input type="number" id="paidAmount" min="0" step="0.01" placeholder="Enter amount" style="color: #000; background-color: #fff; font-weight: bold; padding: 0.5rem; border-radius: 4px;">
                </div>

                <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: var(--danger);">
                    <strong>Due Amount:</strong>
                    <strong id="dueAmountText">₹0.00</strong>
                </div>

                <button class="btn" id="generateBillBtn" onclick="generateBill()" disabled>Generate Bill</button>
            </div>
        </div>
    </div>
    <script src="../../js/utils.js"></script>
    <script src="billing.js"></script>
</body>
</html>
