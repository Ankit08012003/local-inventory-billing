<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Inventory System</title>
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Forgot Password</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">Enter your email to receive an OTP</p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn" id="sendOtpBtn">Send OTP</button>
            </form>
            <div class="text-center mt-4">
                <a href="login.html" class="link">Back to Login</a>
            </div>
        </div>
    </div>
    <script src="../../js/utils.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
