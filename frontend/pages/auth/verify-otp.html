<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Inventory System</title>
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Verify Your Email</h2>
            <p class="text-center" style="margin-bottom: 1rem; color: var(--text-muted);">
                We sent a 6-digit code to <strong id="userEmail"></strong>
            </p>
            <form id="otpForm">
                <div class="form-group">
                    <label>OTP Code</label>
                    <input type="text" id="otp" maxlength="6" required placeholder="123456" style="text-align: center; letter-spacing: 5px; font-size: 1.25rem;">
                </div>
                <button type="submit" class="btn" id="verifyBtn">Verify</button>
            </form>
        </div>
    </div>
    <script src="../../js/utils.js"></script>
    <script src="verify-otp.js"></script>
</body>
</html>
