<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Inventory System</title>
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">Enter the OTP sent to your email</p>
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label>6-Digit OTP</label>
                    <input type="text" id="otp" maxlength="6" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" required>
                </div>
                <button type="submit" class="btn" id="resetBtn">Reset Password</button>
            </form>
            <div class="text-center mt-4">
                <a href="login.html" class="link">Back to Login</a>
            </div>
        </div>
    </div>
    <script src="../../js/utils.js"></script>
    <script src="reset-password.js"></script>
</body>
</html>
