<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Inventory System</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="customers.css">
</head>
<body>
    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Customers</h1>
            <button class="btn" onclick="openCustomerModal()" style="width: auto;">Add Customer</button>
        </div>

        <table id="customersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>Total Due (₹)</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Customers injected here -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="customerModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add Customer</h2>
            <form id="customerForm">
                <input type="hidden" id="customerId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" id="mobile" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeCustomerModal()">Cancel</button>
                    <button type="submit" class="btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Ledger Modal -->
    <div class="modal" id="ledgerModal">
        <div class="modal-content" style="max-width: 700px; max-height: 80vh; overflow-y: auto;">
            <h2 style="margin-bottom: 1.5rem;">Ledger / Passbook</h2>
            <h3 id="ledgerCustomerName" style="color: var(--primary); margin-bottom: 1rem;"></h3>
            <table id="ledgerTable">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Type</th>
                        <th>Amount (₹)</th>
                        <th>Method</th>
                        <th>Note</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Ledger rows -->
                </tbody>
            </table>
            <button class="btn mt-4" onclick="closeLedgerModal()">Close</button>
        </div>
    </div>

    <script src="../../js/utils.js"></script>
    <script src="customers.js"></script>
</body>
</html>
